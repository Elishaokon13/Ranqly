openapi: 3.0.3
info:
  title: Ranqly API Documentation
  description: |
    Complete API documentation for the Ranqly Web3 Ranking and Contest Engine.
    
    This API provides endpoints for:
    - Content scoring and analysis
    - Dispute management and resolution
    - Web content crawling and extraction
    - Audit trails and verification
    - DAO governance and voting
    - User management and authentication
    - Contest and submission management
    
    All services have been migrated from Python to Node.js for improved performance and maintainability.
  version: 1.0.0
  contact:
    name: Ranqly Team
    email: support@ranqly.io
    url: https://ranqly.io
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:8000
    description: Local development server (API Gateway)
  - url: https://api.ranqly.io
    description: Production server
  - url: https://staging-api.ranqly.io
    description: Staging server

tags:
  - name: Authentication
    description: User authentication and authorization
  - name: Contests
    description: Contest creation, management, and participation
  - name: Submissions
    description: Content submission and management
  - name: Scoring
    description: Content scoring and analysis
  - name: Voting
    description: Community voting and sybil detection
  - name: Disputes
    description: Dispute management and resolution
  - name: Crawler
    description: Web content crawling and extraction
  - name: Audit
    description: Audit trails and verification
  - name: Governance
    description: DAO governance and voting
  - name: Health
    description: Service health and monitoring
  - name: Metrics
    description: Performance metrics and analytics

paths:
  # API Gateway Routes
  /api/auth/login:
    post:
      tags: [Authentication]
      summary: User login
      description: Authenticate user and return JWT token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      token:
                        type: string
                      user:
                        $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/contests:
    get:
      tags: [Contests]
      summary: List contests
      description: Get paginated list of contests
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: status
          in: query
          schema:
            type: string
            enum: [active, upcoming, completed, draft]
      responses:
        '200':
          description: List of contests
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Contest'
                  pagination:
                    $ref: '#/components/schemas/Pagination'

    post:
      tags: [Contests]
      summary: Create contest
      description: Create a new contest
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContestCreateRequest'
      responses:
        '201':
          description: Contest created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/Contest'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # Algorithm Engine Routes
  /api/scoring/score:
    post:
      tags: [Scoring]
      summary: Score content
      description: Score a single content submission using NLP analysis
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [submissionId, content, contestContext]
              properties:
                submissionId:
                  type: string
                  description: Unique identifier for the submission
                content:
                  type: string
                  description: Content to be scored
                  minLength: 10
                contestContext:
                  $ref: '#/components/schemas/ContestContext'
                weights:
                  $ref: '#/components/schemas/ScoringWeights'
      responses:
        '200':
          description: Content scored successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/ScoringResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/scoring/batch-score:
    post:
      tags: [Scoring]
      summary: Batch score content
      description: Score multiple content submissions in batch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [submissions]
              properties:
                submissions:
                  type: array
                  items:
                    type: object
                    required: [submissionId, content, contestContext]
                    properties:
                      submissionId:
                        type: string
                      content:
                        type: string
                      contestContext:
                        $ref: '#/components/schemas/ContestContext'
                batchId:
                  type: string
                  description: Optional batch identifier
                priority:
                  type: string
                  enum: [low, normal, high]
                  default: normal
      responses:
        '200':
          description: Batch scoring completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/BatchScoringResponse'

  # Dispute Service Routes
  /api/disputes:
    post:
      tags: [Disputes]
      summary: Create dispute
      description: Create a new dispute for content or contest issues
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [submissionId, contestId, reporterId, disputeType, reason]
              properties:
                submissionId:
                  type: string
                contestId:
                  type: string
                reporterId:
                  type: string
                disputeType:
                  type: string
                  enum: [plagiarism, spam, inappropriate, copyright, fake_submission, other]
                reason:
                  type: string
                  minLength: 10
                evidence:
                  type: array
                  items:
                    type: string
                  description: URLs or references to evidence
      responses:
        '201':
          description: Dispute created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/DisputeResponse'

    get:
      tags: [Disputes]
      summary: List disputes
      description: Get paginated list of disputes with optional filters
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, in_review, resolved, dismissed, escalated]
        - name: priority
          in: query
          schema:
            type: string
            enum: [low, medium, high, urgent]
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: List of disputes
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/DisputeResponse'

  /api/disputes/{disputeId}:
    get:
      tags: [Disputes]
      summary: Get dispute details
      description: Get detailed information about a specific dispute
      parameters:
        - name: disputeId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Dispute details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/DisputeResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  # Content Crawler Routes
  /api/crawler/crawl:
    post:
      tags: [Crawler]
      summary: Crawl URL
      description: Crawl and extract content from a web URL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url]
              properties:
                url:
                  type: string
                  format: uri
                  description: URL to crawl
                options:
                  type: object
                  properties:
                    timeout:
                      type: integer
                      default: 30000
                    followRedirects:
                      type: boolean
                      default: true
                    extractImages:
                      type: boolean
                      default: true
                    extractLinks:
                      type: boolean
                      default: true
      responses:
        '200':
          description: URL crawled successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/CrawlResult'
        '400':
          $ref: '#/components/responses/BadRequest'

  # Audit Store Routes
  /api/audit/entries:
    post:
      tags: [Audit]
      summary: Create audit entry
      description: Create a new immutable audit entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [eventType, entityId, entityType, action, data]
              properties:
                eventType:
                  type: string
                  description: Type of event being audited
                entityId:
                  type: string
                  description: ID of the entity being audited
                entityType:
                  type: string
                  description: Type of entity being audited
                action:
                  type: string
                  description: Action performed
                data:
                  type: object
                  description: Additional data related to the audit event
      responses:
        '201':
          description: Audit entry created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/AuditEntry'

  /api/audit/trail/{entityId}:
    get:
      tags: [Audit]
      summary: Get audit trail
      description: Get complete audit trail for an entity
      parameters:
        - name: entityId
          in: path
          required: true
          schema:
            type: string
        - name: entityType
          in: query
          schema:
            type: string
        - name: startDate
          in: query
          schema:
            type: string
            format: date-time
        - name: endDate
          in: query
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Audit trail retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/AuditEntry'

  # Governance Service Routes
  /api/governance/proposals:
    get:
      tags: [Governance]
      summary: List governance proposals
      description: Get paginated list of DAO governance proposals
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, active, passed, rejected, executed]
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: List of governance proposals
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Proposal'

    post:
      tags: [Governance]
      summary: Create governance proposal
      description: Create a new DAO governance proposal
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, description, proposalType]
              properties:
                title:
                  type: string
                  minLength: 5
                description:
                  type: string
                  minLength: 20
                proposalType:
                  type: string
                  enum: [parameter_change, treasury_spend, protocol_upgrade, other]
                parameters:
                  type: object
                  description: Proposal-specific parameters
      responses:
        '201':
          description: Proposal created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/Proposal'

  # Health Check Routes
  /health:
    get:
      tags: [Health]
      summary: Service health check
      description: Basic health check for all services
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [healthy, degraded, unhealthy]
                  timestamp:
                    type: string
                    format: date-time
                  version:
                    type: string
        '503':
          description: Service is unhealthy

  /health/detailed:
    get:
      tags: [Health]
      summary: Detailed health check
      description: Detailed health check with dependency status
      responses:
        '200':
          description: Detailed health information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailedHealthCheck'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    apiKey:
      type: apiKey
      in: header
      name: X-API-Key

  schemas:
    User:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        username:
          type: string
        role:
          type: string
          enum: [user, moderator, admin, super_admin]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Contest:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [draft, active, upcoming, completed, cancelled]
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        prizePool:
          type: number
        theme:
          type: string
        keywords:
          type: array
          items:
            type: string
        createdBy:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ContestCreateRequest:
      type: object
      required: [title, description, theme, keywords, startDate, endDate]
      properties:
        title:
          type: string
          minLength: 5
          maxLength: 100
        description:
          type: string
          minLength: 20
        theme:
          type: string
          minLength: 3
        keywords:
          type: array
          items:
            type: string
          minItems: 1
          maxItems: 10
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        prizePool:
          type: number
          minimum: 0

    ContestContext:
      type: object
      required: [theme, keywords, contentType]
      properties:
        contestId:
          type: string
        theme:
          type: string
        keywords:
          type: array
          items:
            type: string
        contentType:
          type: string
          enum: [text, image, video, audio, code, other]
        submissionDate:
          type: string
          format: date-time

    ScoringWeights:
      type: object
      properties:
        depth:
          type: number
          minimum: 0
          maximum: 1
          default: 0.4
        reach:
          type: number
          minimum: 0
          maximum: 1
          default: 0.3
        relevance:
          type: number
          minimum: 0
          maximum: 1
          default: 0.2
        consistency:
          type: number
          minimum: 0
          maximum: 1
          default: 0.1

    ScoringResponse:
      type: object
      properties:
        submissionId:
          type: string
        finalScore:
          type: number
          minimum: 0
          maximum: 100
        scoringBreakdown:
          type: object
          properties:
            depth:
              $ref: '#/components/schemas/AxisScore'
            reach:
              $ref: '#/components/schemas/AxisScore'
            relevance:
              $ref: '#/components/schemas/AxisScore'
            consistency:
              $ref: '#/components/schemas/AxisScore'
        weightsUsed:
          $ref: '#/components/schemas/ScoringWeights'
        confidence:
          type: number
          minimum: 0
          maximum: 1
        processingTime:
          type: number
          description: Processing time in seconds
        timestamp:
          type: string
          format: date-time
        modelVersion:
          type: string
        success:
          type: boolean

    AxisScore:
      type: object
      properties:
        score:
          type: number
          minimum: 0
          maximum: 100
        confidence:
          type: number
          minimum: 0
          maximum: 1
        details:
          type: object
          description: Detailed scoring information

    BatchScoringResponse:
      type: object
      properties:
        batchId:
          type: string
        totalSubmissions:
          type: integer
        processedSubmissions:
          type: integer
        failedSubmissions:
          type: integer
        results:
          type: array
          items:
            $ref: '#/components/schemas/ScoringResponse'
        processingTime:
          type: number
        timestamp:
          type: string
          format: date-time
        status:
          type: string
          enum: [pending, processing, completed, failed]

    DisputeResponse:
      type: object
      properties:
        disputeId:
          type: string
        status:
          type: string
          enum: [pending, in_review, resolved, dismissed, escalated]
        priority:
          type: string
          enum: [low, medium, high, urgent]
        assignedResolver:
          type: string
        resolution:
          $ref: '#/components/schemas/ResolutionDetails'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ResolutionDetails:
      type: object
      properties:
        resolutionType:
          type: string
          enum: [approved, rejected, modified, escalated]
        reason:
          type: string
        action:
          type: string
        resolvedBy:
          type: string
        resolvedAt:
          type: string
          format: date-time

    CrawlResult:
      type: object
      properties:
        url:
          type: string
          format: uri
        title:
          type: string
        description:
          type: string
        content:
          type: string
        links:
          type: array
          items:
            type: string
        images:
          type: array
          items:
            type: string
        timestamp:
          type: string
          format: date-time

    AuditEntry:
      type: object
      properties:
        id:
          type: string
        eventType:
          type: string
        entityId:
          type: string
        entityType:
          type: string
        action:
          type: string
        data:
          type: object
        hash:
          type: string
          description: SHA-256 hash for integrity verification
        previousHash:
          type: string
        timestamp:
          type: string
          format: date-time
        blockNumber:
          type: integer
        transactionHash:
          type: string

    Proposal:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        proposalType:
          type: string
          enum: [parameter_change, treasury_spend, protocol_upgrade, other]
        status:
          type: string
          enum: [draft, active, passed, rejected, executed]
        proposer:
          type: string
        votesFor:
          type: integer
        votesAgainst:
          type: integer
        votingPower:
          type: number
        startBlock:
          type: integer
        endBlock:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    DetailedHealthCheck:
      type: object
      properties:
        status:
          type: string
          enum: [healthy, degraded, unhealthy]
        timestamp:
          type: string
          format: date-time
        version:
          type: string
        uptime:
          type: number
          description: Uptime in seconds
        services:
          type: object
          properties:
            database:
              type: boolean
            redis:
              type: boolean
            queue:
              type: boolean
            blockchain:
              type: boolean
        dependencies:
          type: object
          additionalProperties:
            type: boolean
        metrics:
          type: object
          properties:
            memoryUsage:
              type: number
              description: Memory usage in MB
            cpuUsage:
              type: number
            requestCount:
              type: integer
            errorCount:
              type: integer

    Pagination:
      type: object
      properties:
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        totalPages:
          type: integer
        hasNext:
          type: boolean
        hasPrev:
          type: boolean

    Error:
      type: object
      properties:
        success:
          type: boolean
          default: false
        error:
          type: string
        message:
          type: string
        code:
          type: string
        timestamp:
          type: string
          format: date-time
        requestId:
          type: string

  responses:
    BadRequest:
      description: Bad request - invalid input data
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    Unauthorized:
      description: Unauthorized - authentication required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    Forbidden:
      description: Forbidden - insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

