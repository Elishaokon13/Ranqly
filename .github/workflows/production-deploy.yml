name: Production Deployment

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
        - staging
        - production

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ranqly

jobs:
  # Security and Quality Checks
  security-checks:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy scan results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v2
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'

    - name: Run npm audit
      run: |
        cd frontend && npm audit --audit-level=moderate
        cd ../services/api-gateway && npm audit --audit-level=moderate
        cd ../voting-engine && npm audit --audit-level=moderate

    - name: Run Python security check
      run: |
        cd services/algo-engine && pip install safety
        safety check --json --output safety-report.json || true

  # Build and Test
  build-and-test:
    runs-on: ubuntu-latest
    needs: security-checks
    
    strategy:
      matrix:
        service: [api-gateway, voting-engine, algo-engine, frontend]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      if: matrix.service == 'api-gateway' || matrix.service == 'voting-engine' || matrix.service == 'frontend'
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: |
          services/${{ matrix.service }}/package-lock.json
          frontend/package-lock.json

    - name: Set up Python
      if: matrix.service == 'algo-engine'
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      if: matrix.service == 'api-gateway' || matrix.service == 'voting-engine'
      run: |
        cd services/${{ matrix.service }}
        npm ci

    - name: Install Python dependencies
      if: matrix.service == 'algo-engine'
      run: |
        cd services/${{ matrix.service }}
        pip install -r requirements.txt

    - name: Install frontend dependencies
      if: matrix.service == 'frontend'
      run: |
        cd frontend
        npm ci

    - name: Run tests
      if: matrix.service == 'api-gateway' || matrix.service == 'voting-engine'
      run: |
        cd services/${{ matrix.service }}
        npm run test

    - name: Run Python tests
      if: matrix.service == 'algo-engine'
      run: |
        cd services/${{ matrix.service }}
        pytest tests/ -v

    - name: Run frontend tests
      if: matrix.service == 'frontend'
      run: |
        cd frontend
        npm run test

    - name: Build Docker image
      run: |
        docker build -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.service }}:${{ github.sha }} \
          -f services/${{ matrix.service }}/Dockerfile services/${{ matrix.service }}
        docker build -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:${{ github.sha }} \
          -f frontend/Dockerfile frontend

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Push Docker images
      run: |
        docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.service }}:${{ github.sha }}
        docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:${{ github.sha }}

  # Smart Contract Deployment
  deploy-contracts:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: contracts/package-lock.json

    - name: Install dependencies
      run: |
        cd contracts
        npm ci

    - name: Compile contracts
      run: |
        cd contracts
        npx hardhat compile

    - name: Run contract tests
      run: |
        cd contracts
        npx hardhat test

    - name: Run security analysis
      run: |
        cd contracts
        npx hardhat run scripts/security-analysis.js

    - name: Deploy to Polygon
      if: github.ref == 'refs/heads/main'
      run: |
        cd contracts
        npx hardhat run scripts/deploy.js --network polygon
      env:
        PRIVATE_KEY: ${{ secrets.POLYGON_PRIVATE_KEY }}
        POLYGONSCAN_API_KEY: ${{ secrets.POLYGONSCAN_API_KEY }}

    - name: Deploy to Optimism
      if: github.ref == 'refs/heads/main'
      run: |
        cd contracts
        npx hardhat run scripts/deploy.js --network optimism
      env:
        PRIVATE_KEY: ${{ secrets.OPTIMISM_PRIVATE_KEY }}
        OPTIMISM_API_KEY: ${{ secrets.OPTIMISM_API_KEY }}

    - name: Deploy to Arbitrum
      if: github.ref == 'refs/heads/main'
      run: |
        cd contracts
        npx hardhat run scripts/deploy.js --network arbitrum
      env:
        PRIVATE_KEY: ${{ secrets.ARBITRUM_PRIVATE_KEY }}
        ARBITRUM_API_KEY: ${{ secrets.ARBITRUM_API_KEY }}

  # Kubernetes Deployment
  deploy-kubernetes:
    runs-on: ubuntu-latest
    needs: [build-and-test, deploy-contracts]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'v1.28.0'

    - name: Configure kubectl
      run: |
        echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > kubeconfig
        export KUBECONFIG=kubeconfig

    - name: Update image tags
      run: |
        # Update image tags in Kubernetes manifests
        find deployment/kubernetes -name "*.yaml" -exec sed -i "s|IMAGE_TAG|${{ github.sha }}|g" {} \;

    - name: Deploy to staging
      if: github.ref == 'refs/heads/main'
      run: |
        export KUBECONFIG=kubeconfig
        kubectl apply -f deployment/kubernetes/namespace.yaml
        kubectl apply -f deployment/kubernetes/configmaps.yaml
        kubectl apply -f deployment/kubernetes/secrets.yaml
        kubectl apply -f deployment/kubernetes/database.yaml
        kubectl apply -f deployment/kubernetes/redis.yaml
        kubectl apply -f deployment/kubernetes/monitoring.yaml
        kubectl apply -f deployment/kubernetes/services/

    - name: Deploy to production
      if: startsWith(github.ref, 'refs/tags/v')
      run: |
        export KUBECONFIG=kubeconfig
        kubectl apply -f deployment/kubernetes/namespace.yaml
        kubectl apply -f deployment/kubernetes/configmaps.yaml
        kubectl apply -f deployment/kubernetes/secrets.yaml
        kubectl apply -f deployment/kubernetes/database.yaml
        kubectl apply -f deployment/kubernetes/redis.yaml
        kubectl apply -f deployment/kubernetes/monitoring.yaml
        kubectl apply -f deployment/kubernetes/services/

    - name: Wait for deployment
      run: |
        export KUBECONFIG=kubeconfig
        kubectl rollout status deployment/api-gateway-deployment -n ranqly-prod --timeout=600s
        kubectl rollout status deployment/voting-engine-deployment -n ranqly-prod --timeout=600s
        kubectl rollout status deployment/algo-engine-deployment -n ranqly-prod --timeout=600s
        kubectl rollout status deployment/frontend-deployment -n ranqly-prod --timeout=600s

    - name: Run health checks
      run: |
        export KUBECONFIG=kubeconfig
        kubectl run health-check --image=curlimages/curl --rm -i --restart=Never -- \
          curl -f http://api-gateway-service.ranqly-prod.svc.cluster.local:8000/health

  # Post-deployment tests
  post-deployment-tests:
    runs-on: ubuntu-latest
    needs: deploy-kubernetes
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install test dependencies
      run: npm install -g newman

    - name: Run API tests
      run: |
        newman run tests/postman/ranqly-api-tests.json \
          --environment tests/postman/production-environment.json \
          --reporters cli,junit \
          --reporter-junit-export test-results.xml

    - name: Run load tests
      run: |
        newman run tests/postman/load-tests.json \
          --environment tests/postman/production-environment.json \
          --iterations 100

    - name: Upload test results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: test-results
        path: test-results.xml

  # Notification
  notify:
    runs-on: ubuntu-latest
    needs: [deploy-kubernetes, post-deployment-tests]
    if: always()
    
    steps:
    - name: Notify Slack on Success
      if: needs.deploy-kubernetes.result == 'success' && needs.post-deployment-tests.result == 'success'
      uses: 8398a7/action-slack@v3
      with:
        status: success
        channel: '#deployments'
        text: '✅ Ranqly deployment successful! Version ${{ github.sha }} is now live.'
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

    - name: Notify Slack on Failure
      if: needs.deploy-kubernetes.result == 'failure' || needs.post-deployment-tests.result == 'failure'
      uses: 8398a7/action-slack@v3
      with:
        status: failure
        channel: '#deployments'
        text: '❌ Ranqly deployment failed! Please check the logs.'
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/v') && needs.deploy-kubernetes.result == 'success'
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: Release ${{ github.ref }}
        draft: false
        prerelease: false
